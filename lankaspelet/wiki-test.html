<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia Image Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #F9F9F9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #1F2937;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #F59E0B;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        input {
            flex-grow: 1;
            padding: 12px 16px;
            border: 2px solid #374151;
            background: #111827;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #F59E0B;
        }

        button {
            background: #F59E0B;
            color: #111827;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        #result-container {
            margin-top: 20px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #374151;
            border-radius: 12px;
            padding: 20px;
        }

        #image-preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            border: 4px solid white;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #9CA3AF;
        }

        .text-fallback {
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            color: #4B5563;
            text-align: center;
        }

        .loader {
            border: 4px solid #374151;
            border-top: 4px solid #F59E0B;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 Anime Cutscene Image Tester</h1>
        <p style="color: #9CA3AF; margin-bottom: 24px;">Test how the game fetches Wikipedia images for your words.</p>
        
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="Enter a word (e.g. 'volcano')...">
            <button id="testBtn">Fetch Image</button>
        </div>

        <div id="result-container">
            <div class="loader" id="loader"></div>
            <img id="image-preview" src="" alt="Wikipedia Result">
            <div id="text-fallback" class="text-fallback" style="display: none;"></div>
            <div id="status">Type a word and hit enter</div>
        </div>
    </div>

    <script>
        const wordInput = document.getElementById('wordInput');
        const testBtn = document.getElementById('testBtn');
        const imagePreview = document.getElementById('image-preview');
        const textFallback = document.getElementById('text-fallback');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        async function fetchWikipediaImage(word) {
            try {
                // Increase gsrlimit to 10 to find visual results even if the top hit is a text-only disambiguation page
                const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${word}&gsrlimit=10&prop=pageimages&format=json&pithumbsize=600&origin=*`);
                const data = await res.json();
                
                if (data.query && data.query.pages) {
                    // Convert to array and sort by the search result index to ensure determinism
                    const pagesArray = Object.values(data.query.pages).sort((a, b) => a.index - b.index);
                    
                    // Iterate through sorted results to find the first one with an actual image
                    for (const page of pagesArray) {
                        if (page.pageid && page.thumbnail) {
                            return { 
                                url: page.thumbnail.source,
                                title: page.title
                            };
                        }
                    }
                }
            } catch (e) { console.error(e); }
            return null;
        }

        async function getSmartImageFallback(word) {
            // 1. Try the word itself
            status.innerText = `Searching Wikipedia for "${word}"...`;
            let img = await fetchWikipediaImage(word);
            if (img) return { ...img, source: 'Wikipedia Exact Match' };

            // 2. Try a more "concrete" search query for the same word
            status.innerText = `No visual for "${word}". Trying concrete search...`;
            img = await fetchWikipediaImage(`${word} object`);
            if (img) return { ...img, source: 'Wikipedia Concrete Nudge' };

            // 3. Engaging Datamuse but with stricter filtering
            status.innerText = `No visual for "${word}". Engaging Datamuse related words...`;

            try {
                const dmRes = await fetch(`https://api.datamuse.com/words?ml=${word}&max=10`);
                const relatedWords = await dmRes.json();

                for (const item of relatedWords) {
                    // Skip highly abstract words that often lead to "Christianity" or "Philosophy" (suffixes like -ness, -ity, -ism, etc.)
                    if (item.word.endsWith('ness') || item.word.endsWith('ity') || item.word.endsWith('ism') || 
                        item.word.endsWith('ance') || item.word.endsWith('ence') || item.word.endsWith('able') || item.word.endsWith('ible')) {
                        console.log(`Skipping abstract related word: "${item.word}"`);
                        continue;
                    }

                    status.innerText = `Trying related word: "${item.word}"...`;
                    img = await fetchWikipediaImage(item.word);
                    if (img) {
                        return { ...img, source: `Fallback via Datamuse: "${item.word}"` };
                    }
                }
            } catch (e) {
                console.error("Datamuse API failed.");
            }

            return null;
        }

        async function runTest() {
            const word = wordInput.value.trim().toLowerCase();
            if (!word) return;

            // Reset UI
            imagePreview.style.display = 'none';
            textFallback.style.display = 'none';
            loader.style.display = 'block';
            status.innerText = "Processing...";

            const result = await getSmartImageFallback(word);

            loader.style.display = 'none';

            if (result) {
                imagePreview.src = result.url;
                imagePreview.style.display = 'block';
                status.innerHTML = `✅ Found: <b>${result.title}</b><br><span style="font-size: 12px; color: #F59E0B;">${result.source}</span>`;
            } else {
                textFallback.innerText = word;
                textFallback.style.display = 'block';
                status.innerText = "❌ No image found. Game would use text fallback.";
            }
        }

        testBtn.addEventListener('click', runTest);
        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') runTest();
        });
    </script>
</body>
</html>
