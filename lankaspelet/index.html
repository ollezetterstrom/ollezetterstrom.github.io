<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linxicon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
</head>

<body>

    <aside id="sidebar">
        <div class="brand">Linxicon</div>
        <div id="status-text">⏳ Loading AI Engine...</div>

        <div class="input-group">
            <label for="wordInput" class="sr-only">Enter a linking word</label>
            <input type="text" id="wordInput" placeholder="Enter a linking word..." disabled>
            <button id="addWordBtn" aria-label="Add word to board" disabled>Add Word</button>
            <button id="hintBtn" aria-label="Get a hint" disabled style="background-color: var(--color-warning); margin-top: -4px;">💡 Get Hint</button>
        </div>
        <div id="error-msg"></div>

        <div class="history-header">Connection Log</div>
        <div id="history-log"></div>

        <button id="newGameBtn" aria-label="Restart game" style="margin-top: 12px; background-color: #E5E7EB; color: #374151;">Restart
            Game</button>
    </aside>

    <div id="canvas-container">
        <div id="board">
            <div class="dots-bg"></div>
            <svg id="lines-layer"></svg>
        </div>

        <div id="zoom-controls">
            <button id="zoomInBtn" title="Zoom In ( + )">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button id="zoomOutBtn" title="Zoom Out ( - )">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button id="recenterBtn" title="Recenter View ( Space )">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>

</html>
